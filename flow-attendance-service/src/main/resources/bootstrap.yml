          att_rule:
            actual-data-nodes: ds_attendance_0.att_rule
        sharding-algorithms:
          att-user-mod-2:
            type: MOD
            props:
              sharding-count: 2
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:nacos-dev}:8848
