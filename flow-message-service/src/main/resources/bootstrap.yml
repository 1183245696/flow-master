spring:
  application:
    name: oaplatform-message
  profiles:
    active: local
  config:
    import: optional:nacos:${spring.application.name}.yml

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: local
      config:
        server-addr: 127.0.0.1:8848
        namespace: local
        file-extension: yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/oa_message?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 6
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000

server:
  port: 8086

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

---
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:nacos-dev}:8848
        namespace: dev
      config:
        server-addr: ${NACOS_HOST:nacos-dev}:8848
        namespace: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql-dev}:3306/oa_message?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:oa}
    password: ${DB_PASS:oa123}
  data:
    redis:
      host: ${REDIS_HOST:redis-dev}
  rabbitmq:
    host: ${RABBIT_HOST:rabbit-dev}
    username: ${RABBIT_USER:oa}
    password: ${RABBIT_PASS:oa123}

server:
  port: 8086

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST}:8848
        namespace: prod
      config:
        server-addr: ${NACOS_HOST}:8848
        namespace: prod
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/oa_message?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER}
    password: ${DB_PASS}
  data:
    redis:
      host: ${REDIS_HOST}
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: ${RABBIT_HOST}
    username: ${RABBIT_USER}
    password: ${RABBIT_PASS}

server:
  port: 8086
