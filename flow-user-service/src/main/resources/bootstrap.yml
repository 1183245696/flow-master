        jdbc-url: jdbc:mysql://${DB_HOST:mysql-dev}:3306/oa_user_1?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
        username: ${DB_USER:oa}
        password: ${DB_PASS:oa123}
    rules:
      sharding:
        tables:
